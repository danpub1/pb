name: Release

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: 
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'  # Specify the Go version

      - name: Build
        run: |
          GOOS=linux GOARCH=amd64 go build ./...  # Run the build recursively
          GOOS=windows GOARCH=amd64 go build ./...  # Run the build recursively

      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{github.ref_name}}
          gh release upload ${{github.ref_name}} pb
          gh release upload ${{github.ref_name}} pb.exe