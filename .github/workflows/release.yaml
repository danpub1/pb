name: Release

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'  # Specify the Go version

      - name: Build Linux
        run: GOOS=linux GOARCH=amd64 go build ./...  # Run the build recursively

      - name: Build Windows
        run: GOOS=Windows GOARCH=amd64 go build ./...  # Run the build recursively

      - name: Create Release
        run: gh release create ${{github.ref_name}}

      - name: Upload Linux Binary
        run: gh release upload ${{github.ref_name}} pb

      - name: Upload Windows Binary
        run: gh release upload ${{github.ref_name}} pb.exe
        